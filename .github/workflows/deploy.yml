name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject cache-busting version
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "Using version: $VERSION"
          
          for file in *.html; do
            sed -i "s|assets/css/hmkg\.css\"|assets/css/hmkg.css?v=$VERSION\"|g" "$file"
            sed -i "s|assets/js/hmkg\.js\"|assets/js/hmkg.js?v=$VERSION\"|g" "$file"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4